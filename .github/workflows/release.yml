name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: recon
            asset_name: recon-linux-x86_64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: recon
            asset_name: recon-macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: recon
            asset_name: recon-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: recon.exe
            asset_name: recon-windows-x86_64.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          # Install MinGW via chocolatey
          choco install mingw -y

          # Find and add MinGW to PATH
          $mingwPath = "C:\ProgramData\mingw64\mingw64\bin"
          if (!(Test-Path $mingwPath)) {
            $mingwPath = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
          }
          if (!(Test-Path $mingwPath)) {
            # Search for gcc
            $gcc = Get-ChildItem -Path "C:\ProgramData" -Recurse -Filter "gcc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($gcc) {
              $mingwPath = $gcc.DirectoryName
            }
          }

          Write-Host "Using MinGW path: $mingwPath"
          echo "$mingwPath" >> $env:GITHUB_PATH

          # Verify gcc is available
          & "$mingwPath\gcc.exe" --version

      - name: Install static GMP (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install gmp
          echo "LIBRARY_PATH=$(brew --prefix gmp)/lib:$LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install static GMP (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev

      - name: Build
        env:
          # On Windows, ensure we use GNU toolchain
          CC: ${{ runner.os == 'Windows' && 'gcc' || '' }}
          CXX: ${{ runner.os == 'Windows' && 'g++' || '' }}
        run: |
          echo "Building for target: ${{ matrix.target }}"
          cargo build --release --target ${{ matrix.target }}

      # macOS Code Signing
      - name: Import Code Signing Certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          # Create and configure keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Clean up certificate file
          rm $RUNNER_TEMP/certificate.p12

      - name: Sign Binary (macOS)
        if: runner.os == 'macOS'
        run: |
          # Find the Developer ID certificate
          IDENTITY=$(security find-identity -v -p codesigning | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with identity: $IDENTITY"

          # Sign the binary with hardened runtime (required for notarization)
          codesign --sign "$IDENTITY" \
            --options runtime \
            --timestamp \
            --force \
            target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

          # Verify signature
          codesign --verify --verbose target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Notarize Binary (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create a ZIP for notarization (notarytool requires an archive)
          ditto -c -k --keepParent target/${{ matrix.target }}/release/${{ matrix.artifact_name }} $RUNNER_TEMP/notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit $RUNNER_TEMP/notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          # Clean up
          rm $RUNNER_TEMP/notarize.zip

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd -

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd -

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
